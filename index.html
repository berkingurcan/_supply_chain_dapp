				text-align: center;
			}
			.button{

				padding: 10 20 10 20;
				margin: 5 5 5 5;
				border: none;
				background: #3B3B3B 0% 0% no-repeat padding-box;
				color: white;
				font-size: 18px;
				font-family: Helvetica Neue;
				font-style: bold;
				cursor: pointer;
				transition-duration: 0.4s;
  				-webkit-transition-duration: 0.4s;
			}
			.button:hover {

			}

			.item3{
